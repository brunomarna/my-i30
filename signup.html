<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link
      href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css"
      rel="stylesheet"
    />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
  <link href="https://fonts.googleapis.com/css2?family=Federant&family=M+PLUS+Rounded+1c&family=Playwrite+CU+Guides&family=Roboto+Mono:ital,wght@0,100..700;1,100..700&family=Roboto:ital,wght@0,100..900;1,100..900&family=Space+Grotesk:wght@300..700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./src/css/signup.css">
  <link rel="stylesheet" href="./src/css/index.css">
  <title>Sign-up</title>
</head>
<body class="sigup-page">
  <main class="container">
  <form id="signup-form">
    <h1>Sign Up<img class="logo" src="./src/img/icons8-hyundai-48.png"></h1>
    
    <div class="inputs">
      <input type="email" id="signup-email" style="background-color:rgb(223, 240, 254);" placeholder="Enter your email" required />
      <i class="fa-solid fa-car"></i>
    </div>
    <div class="inputs">
      <input type="password" id="signup-password" style="background-color:rgb(223, 240, 254);" placeholder="Create a password" required />
      <i class="fa-solid fa-key"></i>
    </div>

    <button class="submit" type="submit">Create Account</button>

    <div class="register-link">
      <p>Already have an account? <a href="index.html">Login</a></p>
    </div>
  </form>
</main>
  <script src="./src/js/signup.js"></script>
</body>
</html>
