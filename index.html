<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link
      href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css"
      rel="stylesheet"
    />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
  <link href="https://fonts.googleapis.com/css2?family=Federant&family=M+PLUS+Rounded+1c&family=Playwrite+CU+Guides&family=Roboto+Mono:ital,wght@0,100..700;1,100..700&family=Roboto:ital,wght@0,100..900;1,100..900&family=Space+Grotesk:wght@300..700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./src/css/index.css">
  <title>My i30</title>
</head>
<body>
  <header class="header">
    <div>
    <img class="home-icon" src="./src/img/icons8-hyundai-48.png" />
    <span id="myi30text">My i30</span>
    </div>
    
  </header>

  <main class="container">
    <form>
      
      <h1>Login<img class="logo" src="./src/img/icons8-hyundai-48.png"></h1>
      <div class="inputs">
        <input  type="email" id="input-login" placeholder="Enter your email" style="background-color:rgb(223, 240, 254);"/><i class="fa-solid fa-car"></i>
      </div>
      <div class="inputs">
        <input  type="password" id="input-password" placeholder="Enter your password" style="background-color:rgb(223, 240, 254);"/>
        <i class="fa-solid fa-key"></i>
      </div>
      <div class="remeber-forgot">
        <label>
        <input type="checkbox">Remember me
        </label>
        <a href="forgot-password.html">Forgot password</a>
      </div>

      <button class="submit" id="btn-submit">Login</button>

      <div class="register-link">
        <p>I'm not registered <a href="signup.html">Sign-up
        </a></p>
      </div>


      <div class="demo-section">
      <p>Want to see how it works?</p>
      <i class="fa-brands fa-github"></i>
      <button type="button" class="github-demo-btn" id="btn-demo">View Demo Account</button>
      </div>
    </form>

    <footer>
    <p>© 2026 My i30. This project is a personal portfolio piece and is not 
    affiliated with, authorized, maintained, sponsored, or endorsed by Hyundai 
    Motor Company or any of its affiliates.</p>
    </footer>
  </main>



  <script src="./src/js/index.js"></script>
</body>
</html>
