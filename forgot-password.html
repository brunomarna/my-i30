<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="./src/css/index.css">
  <title>Forgot Password</title>
</head>
<body style="background: url('./src/img/index-brunoi30.JPEG') no-repeat center center fixed; background-size: cover;">
    <main class="container">
  <form id="forgot-form">
    <h1>Reset Password<img class="logo" src="./src/img/icons8-hyundai-48.png"></h1>
    <p class="instruction-text">Enter your email to receive a reset link.</p>
    
    <div class="inputs">
      <input type="email" id="reset-email" placeholder="Enter your email" required />
      <i class="fa-solid fa-envelope"></i>
    </div>

      <button class="submit" type="submit">Send Reset Link</button>

      <div class="register-link">
        <p><a href="index.html">Back to Login</a></p>
      </div>
    </form>
  </main> 

  <script src="./src/js/forgot.js"></script>
</body>
</html>
